<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>SentinelAI — Protect Yourself from SMS Scams</title>
    <meta name="description" content="AI-powered SMS fraud detection for rural India. Detect scams instantly in Hindi, English, and Telugu. Free forever." />
    <meta name="author" content="SentinelAI" />

    <!-- Preconnect for faster font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Non-blocking font load — does not delay first paint -->
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    </noscript>

    <meta property="og:title" content="SentinelAI — Stop SMS Scammers" />
    <meta property="og:description" content="AI-powered SMS fraud detection protecting rural India. Free, instant, multilingual." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Inline splash screen — visible immediately before JS loads -->
    <style>
      #app-loading {
        position: fixed;
        inset: 0;
        background: #f9f6f0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        font-family: 'Mukta', 'Inter', system-ui, sans-serif;
      }
      #app-loading .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      #app-loading .brand-name {
        font-size: 26px;
        font-weight: 700;
        color: #1e293b;
        letter-spacing: -0.3px;
      }
      #app-loading .brand-name span { color: #ff8c1a; }
      #app-loading .tagline {
        font-size: 13px;
        color: #94a3b8;
      }
      #app-loading .spinner {
        width: 28px;
        height: 28px;
        border: 2.5px solid #e5ddd3;
        border-top-color: #ff8c1a;
        border-radius: 50%;
        animation: spin 0.75s linear infinite;
        margin-top: 4px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>

  <body>
    <div id="root">
      <!-- Static splash screen — React replaces this on mount -->
      <div id="app-loading">
        <div class="brand">
          <svg width="34" height="34" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L4 6v6c0 5.5 3.8 10.7 8 12 4.2-1.3 8-6.5 8-12V6l-8-4z" fill="#ff8c1a" fill-opacity="0.15"/>
            <path d="M12 2L4 6v6c0 5.5 3.8 10.7 8 12 4.2-1.3 8-6.5 8-12V6l-8-4z" stroke="#ff8c1a" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M9 12l2 2 4-4" stroke="#ff8c1a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <div class="brand-name">Sentinel<span>AI</span></div>
        </div>
        <div class="tagline">Protecting you from SMS scams</div>
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
